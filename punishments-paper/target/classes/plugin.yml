name: PunishmentsPaper
version: 1.0.0
main: nl.punishments.paper.PunishmentsPaper
api-version: "1.21"
description: Paper backhand voor het Punishments systeem
authors: [JouwNaam]

permissions:
  punishments.history:
    description: Eigen punishment history bekijken
    default: true
  punishments.history.others:
    description: History van andere spelers bekijken
    default: op
  punishments.staff:
    description: Staff meldingen ontvangen
    default: op
  punishments.ban:
    description: Spelers bannen
    default: op
  punishments.tempban:
    description: Spelers tijdelijk bannen
    default: op
  punishments.unban:
    description: Spelers unbannen
    default: op
  punishments.mute:
    description: Spelers muten
    default: op
  punishments.tempmute:
    description: Spelers tijdelijk muten
    default: op
  punishments.unmute:
    description: Spelers unmuten
    default: op
  punishments.warn:
    description: Spelers waarschuwen
    default: op
  punishments.kick:
    description: Spelers kicken
    default: op
